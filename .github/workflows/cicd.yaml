---
name: "CI/CD"

"on":
  push: {}

jobs:
  pre-commit:
    runs-on: "ubuntu-24.04"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@v6.0.3"
      - name: "Cache mise tools"
        uses: "actions/cache@v5.0.5"
        with:
          path: "${{ github.workspace }}/.cache/mise"
          key: "${{ hashFiles('mise.toml') }}"
      - name: "Setup mise"
        uses: "jdx/mise-action@v4.1.0"
      - name: "Run linting, building, tests"
        run: "mise run pre-commit"

  release-job:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: "write"
      packages: "write"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@v6.0.3"
        with:
          fetch-depth: 0
      - name: "Cache mise tools"
        uses: "actions/cache@v5.0.5"
        with:
          path: "${{ github.workspace }}/.cache/mise"
          key: "${{ hashFiles('mise.toml') }}"
      - name: "Setup mise"
        uses: "jdx/mise-action@v4.0.1"
      - name: "Publish release"
        run: "mise run release:publish"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          DEFAULT_BRANCH: "${{ github.event.repository.default_branch }}"
          CURRENT_BRANCH: "${{ github.ref_name }}"
